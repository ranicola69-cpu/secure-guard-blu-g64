name: Build & Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'
      - '.github/scripts/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn 1
        run: npm install -g yarn@1

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --ignore-engines --no-frozen-lockfile

      - name: Apply Gradle plugin compatibility patches
        run: python3 .github/scripts/apply-gradle-patches.py

      - name: Install Android NDK 27
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006" 2>&1 | tail -5

      - name: Run Expo Prebuild
        working-directory: frontend
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform android --no-install

      - name: Pin Gradle to 8.10.2
        run: |
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.10.2-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' \
            > frontend/android/gradle/wrapper/gradle-wrapper.properties
          echo "Gradle pinned to 8.10.2"

      - name: Apply Android build patches (hermes path + core-ktx version fix)
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: python3 .github/scripts/fix-android-build.py


      - name: Strip worklets from Java autolinking only (prevents native crash)
        run: |
          echo "Removing react-native-worklets from Java autolinking ONLY..."
          echo "NOTE: Keep worklets in settings.gradle and build.gradle (reanimated needs it as a Gradle project)"
          # Remove worklets entries from expo-modules autolinking (Java class registration)
          find frontend/android -name "ExpoModulesPackageList.java" -exec sed -i '/worklets/Id' {} \;
          # Remove worklets from React Native CLI autolinking (Java class registration)
          find frontend/android -name "PackageList.java" -exec sed -i '/worklets/Id' {} \;
          # DO NOT remove from settings.gradle — reanimated build.gradle references :react-native-worklets
          # DO NOT remove from build.gradle includes — same reason
          echo "Worklets stripped from Java autolinking (Gradle project kept for reanimated compatibility)"

      - name: Patch MainApplication.kt (remove New Architecture entry point)
        run: |
          MAIN_APP=frontend/android/app/src/main/java/com/dphms/secureguard/MainApplication.kt
          echo "Rewriting MainApplication.kt for old architecture..."
          echo "" | base64 -d > "$MAIN_APP"
          echo "Patched MainApplication.kt (removed NewArch entry point)"
          cat "$MAIN_APP"

      - name: Build Debug APK
        working-directory: frontend/android
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log; exit ${PIPESTATUS[0]}

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log

      - name: Locate APK
        id: apk
        run: |
          APK=$(find frontend/android/app/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found: $APK ($(du -h "$APK" | cut -f1))"

      - name: Get app version
        id: version
        run: |
          VER=$(node -e "console.log(require('./frontend/app.json').expo.version)")
          echo "version=${VER}-beta" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}-beta" >> "$GITHUB_OUTPUT"

      - name: Rename APK for release
        run: cp "${{ steps.apk.outputs.path }}" "SecureGuard-${{ steps.version.outputs.version }}.apk"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 'Secure Guard ${{ steps.version.outputs.tag }}'
          body: |
            ## Secure Guard ${{ steps.version.outputs.tag }}

            Built from source via GitHub Actions (local Gradle build — EAS quota exhausted until April 1 2026).

            ### Install on Blu G64
            1. Download `SecureGuard-${{ steps.version.outputs.version }}.apk`
            2. On your device: **Settings → Security → Install unknown apps** → enable for your file manager
            3. Open the APK file to install
          files: SecureGuard-${{ steps.version.outputs.version }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
